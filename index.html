<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8번 차원</title>
<link rel="icon" href="./images/icon.webp" type="image/webp">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<style>
    @font-face { 
        font-family: 'ONE-Mobile-POP'; 
        src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2105_2@1.0/ONE-Mobile-POP.woff') format('woff'); 
    }
    body { 
        font-family: 'ONE-Mobile-POP', sans-serif; 
        background-color: #2c3e50; 
        background-image: radial-gradient(#34495e 15%, transparent 16%), radial-gradient(#34495e 15%, transparent 16%);
        background-size: 60px 60px;
        background-position: 0 0, 30px 30px;
        color: #fff; text-align: center; margin: 0; padding: 0; 
        display: flex; justify-content: center; align-items: center; height: 100vh; user-select: none;
    }

    #game-container { 
        width: 95vw; max-width: 900px; height: 90vh; max-height: 720px;
        background-color: #fffdf7; color: #333;
        border: 8px solid #f39c12; border-radius: 20px; position: relative; 
        overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 15px 30px rgba(0,0,0,0.5);
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      10%, 30%, 50%, 70%, 90% { transform: translateX(-8px); }
      20%, 40%, 60%, 80% { transform: translateX(8px); }
    }
    .shake-effect { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; }

    .screen { 
        display: none; width: 100%; height: 100%; flex-direction: column; 
        justify-content: center; align-items: center; position: absolute; 
        top: 0; left: 0; animation: fadeIn 0.3s ease-in-out; padding: 20px; box-sizing: border-box;
    }
    .active { display: flex; }
    @keyframes imageFadeIn {
        from { opacity: 0; transform: scale(0.98); }
        to { opacity: 1; transform: scale(1); }
    }
    .fade-in-effect {
        animation: imageFadeIn 0.5s ease-out;
    }
    .score-board { 
        position: absolute; top: 20px; left: 20px; font-size: 24px; color: #fff; 
        background: #e67e22; padding: 8px 20px; border-radius: 30px; z-index: 10; border: 3px solid #d35400;
        display: none; 
    }

    .btn-skip {
        position: absolute; top: 20px; right: 20px; background-color: #7f8c8d;
        border-bottom: 5px solid #636e72; padding: 12px 26px; font-size: 22px;   
        font-family: 'ONE-Mobile-POP', sans-serif; color: white; border-radius: 25px;
        z-index: 20; cursor: pointer; transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .btn-skip:hover { background-color: #95a5a6; transform: translateY(-3px); }
    .btn-skip:active { transform: translateY(2px); }
    
    .char-image-container { 
        width: 90%; max-width: 400px; aspect-ratio: 1 / 1; flex-shrink: 0;
        background-color: #ecf0f1; display: flex; justify-content: center; align-items: center; 
        margin-bottom: 15px; border: 6px solid #bdc3c7; border-radius: 20px; 
        overflow: hidden; position: relative; 
    }
    .char-image-container img { width: 100%; height: 100%; object-fit: contain; }
    
    .name-overlay {
        position: absolute; top: 10px; left: 10px; background: rgba(0, 0, 0, 0.6); color: #fff; 
        padding: 8px 15px; border-radius: 15px; font-size: 25px;
        font-weight: normal; box-shadow: 0 2px 5px rgba(0,0,0,0.3); white-space: nowrap; z-index: 5;
    }

    .stats-overlay {
        position: absolute; bottom: 10px; right: 10px; background: rgba(0, 0, 0, 0.7); color: #fff;
        padding: 6px 12px; border-radius: 12px; font-size: 14px;
        text-align: right; box-shadow: 0 2px 5px rgba(0,0,0,0.3); z-index: 5;
    }

    .speech-box {
        width: 90%; max-width: 500px; min-height: 40px; background: rgba(255, 255, 255, 0.95);
        color: #2c3e50; border-radius: 12px; padding: 12px 20px; margin-bottom: 15px;
        border: 4px solid #34495e; box-shadow: 4px 4px 0px rgba(52, 73, 94, 0.1);
        display: flex; justify-content: center; align-items: center; font-size: 18px;
    }
    .speech-box p { white-space: pre-wrap; margin: 0; line-height: 1.4; }

    button { 
        padding: 15px 40px; font-size: 20px; font-family: 'ONE-Mobile-POP', sans-serif;
        cursor: pointer; border: none; border-radius: 50px; 
        transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        box-shadow: 0 8px 0px rgba(0,0,0,0.15); color: white; text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
        display: inline-flex; align-items: center; justify-content: center; outline: none;
    }
    button:hover { transform: translateY(-5px); box-shadow: 0 13px 0px rgba(0,0,0,0.1); }
    button:active { transform: translateY(5px); box-shadow: 0 2px 0px rgba(0,0,0,0.2); }

    .btn-group { display: flex; gap: 15px; justify-content: center; }
    .btn-real { background-color: #2ecc71; border-bottom: 4px solid #27ae60; }
    .btn-fake { background-color: #e74c3c; border-bottom: 4px solid #c0392b; }
    .btn-move { background-color: #3498db; border-bottom: 4px solid #2980b9; padding: 18px 50px; }
    .btn-close { background-color: #7f8c8d; border-bottom: 4px solid #636e72; padding: 12px 24px; font-size: 16px; margin-top: 15px; }

    #waiting-list-panel {
        transition: all 0.3s ease; overflow-y: auto; scrollbar-width: none; -ms-overflow-style: none;
        display: flex; flex-direction: column; align-items: center;
    }
    #waiting-list-panel::-webkit-scrollbar { display: none; }
    #waiting-list-panel.full-view { width: 100%; justify-content: flex-start; }
    
    #filter-container {
        display: flex; flex-wrap: wrap; justify-content: center; gap: 6px; width: 100%; 
        padding: 15px 10px 5px 10px; max-width: 600px; box-sizing: border-box; flex-shrink: 0;
    }
    #waiting-list-panel.detail-view #filter-container { padding: 10px 5px; max-width: 100%; }

    .filter-btn {
        width: 30px; height: 30px; border-radius: 50%; border: 2px solid #bdc3c7; background-color: #ecf0f1;
        color: #2c3e50; font-family: 'ONE-Mobile-POP', sans-serif; font-size: 13px; cursor: pointer; 
        transition: all 0.2s; display: flex; justify-content: center; align-items: center;
        padding: 0; flex-shrink: 0; box-shadow: 0 3px 0px rgba(0,0,0,0.1);
    }
    .filter-btn.all-btn { width: auto; padding: 0 12px; border-radius: 15px; }
    .filter-btn:hover { background-color: #f39c12; color: white; border-color: #d35400; transform: translateY(-2px); }
    .filter-btn.active { background-color: #e67e22; color: white; border-color: #d35400; transform: translateY(2px); box-shadow: 0 1px 0px rgba(0,0,0,0.1); }

    #waiting-chars { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; padding: 10px; width: 100%; box-sizing: border-box; }
    #waiting-list-panel.detail-view { width: 170px; border-left: 4px dashed #bdc3c7; padding: 0; cursor: grab; }
    #waiting-list-panel.detail-view:active { cursor: grabbing; }
    #waiting-list-panel.detail-view #waiting-chars { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; justify-items: center; padding-top: 5px; }

    .waiting-char { 
        width: 65px; height: 65px; background-color: #fff; border-radius: 50%; 
        cursor: pointer; overflow: hidden; border: 4px solid #bdc3c7; transition: transform 0.2s; flex-shrink: 0;
    }
    .waiting-char:hover { transform: scale(1.1); }
    .waiting-char img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
    .waiting-char.correct { border-color: #2ecc71; }
    .waiting-char.wrong { border-color: #e74c3c; }
    .waiting-char.unattempted { border-color: #95a5a6; filter: grayscale(100%); opacity: 0.6; }

    .detail-layout { display: flex; flex-direction: row; align-items: stretch; justify-content: center; width: 100%; max-width: 550px; }
    .vertical-nav { display: flex; flex-direction: column; gap: 12px; justify-content: center; padding-right: 15px; }
    .nav-btn {
        padding: 12px 20px; font-size: 18px; border: none; border-radius: 12px; cursor: pointer;
        font-family: 'ONE-Mobile-POP', sans-serif; transition: all 0.2s; background: #95a5a6; color: white;
        border-bottom: 4px solid #7f8c8d; box-shadow: none;
    }
    .nav-btn.active { background: #f39c12; border-bottom: 4px solid #d35400; transform: scale(1.05); }
    .nav-btn:hover:not(.active) { background: #bdc3c7; transform: translateY(-2px); }
    
    #btn-review {
        position: absolute; right: 20px; bottom: 30px; padding: 12px 20px; font-size: 16px; 
        background-color: #9b59b6; border-bottom: 4px solid #8e44ad; box-shadow: 0 4px 0px rgba(0,0,0,0.15);
    }
    #btn-review:hover { background-color: #8e44ad; }

    #toast-notification {
        position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.9);
        background-color: rgba(44, 62, 80, 0.95); color: #f1c40f; padding: 20px 40px;
        border-radius: 20px; font-size: 22px; font-family: 'ONE-Mobile-POP', sans-serif;
        border: 4px solid #f39c12; box-shadow: 0 10px 25px rgba(0,0,0,0.5); z-index: 1000;
        pointer-events: none; opacity: 0; transition: opacity 0.3s ease, transform 0.3s ease;
        text-align: center; line-height: 1.4; display: none; 
    }
    #toast-notification.show { display: block; opacity: 1; transform: translate(-50%, -50%) scale(1); }

    #volume-sprite-container {
        position: absolute; 
        bottom: 20px; 
        left: 20px; 
        z-index: 50;
        display: none; 
        flex-direction: column; 
        align-items: center; 
        cursor: pointer; 
        user-select: none;
        touch-action: none;
    }
    #volume-text {
        font-size: 16px; font-weight: bold; color: #fff;
        background: rgba(0,0,0,0.6); padding: 4px 10px; border-radius: 12px;
        margin-bottom: 8px; text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        border: 2px solid rgba(255,255,255,0.2);
        opacity: 0; transition: opacity 0.5s ease-out; pointer-events: none;
    }
    #volume-text.show { opacity: 1; }
    
    #volume-label {
        font-size: 16px; font-weight: bold; color: #e67e22; margin-top: 5px; 
     
    }
    #volume-sprite {
        width: 63px; height: 63px;
        background-image: url('./images/volume_sprite.png'); 
        background-repeat: no-repeat; filter: drop-shadow(0px 4px 6px rgba(0,0,0,0.4)); transition: transform 0.1s;
    }
    #volume-sprite:active { transform: scale(0.95); }

    .title-logo { 
        font-size: 80px; color: #f39c12; text-shadow: 4px 4px 0px #d35400; 
        margin-bottom: 20px; animation: bounce 2s infinite; 
    }
    @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    .copyright-notice { position: absolute; bottom: 20px; left: 20px; text-align: left; font-size: 11px; color: #7f8c8d; line-height: 1.5; pointer-events: none; }
    .release-date { position: absolute; bottom: 20px; right: 20px; font-size: 14px; color: #95a5a6; font-weight: bold; }
    
    #loading-ui { width: 100%; display: flex; flex-direction: column; align-items: center; }
    #screen-loading { background-color: #fffdf7; background-size: cover; background-position: center; background-repeat: no-repeat; position: relative; transition: background 0.5s ease-in-out; }
    #screen-loading.loaded { background-image: url('./images/bg.webp'); background-size: auto; background-position: center 15%; background-repeat: no-repeat; }
    #loading-container { width: 80%; height: 24px; background-color: #ecf0f1; border-radius: 12px; margin-top: 20px; border: 3px solid #34495e; overflow: hidden; }
    #loading-bar { width: 0%; height: 100%; background-color: #f1c40f; transition: width 0.3s ease-out; }
    
    .result-title { font-size: 32px; margin-bottom: 5px; margin-top: 30px; transition: color 0.3s; }
    .result-correct { color: #27ae60; }
    .result-wrong { color: #c0392b; }
    .result-question { color: #3498db; }

    #ending-slide-container { display: none; width: 100%; height: 100%; overflow: hidden; position: relative; align-items: center; justify-content: flex-start; }
    #ending-slide-track { display: flex; align-items: center; height: 100%; width: max-content; }
    .slide-item { position: relative; height: 70%; aspect-ratio: 1 / 1; margin: 0 15px; flex-shrink: 0; border-radius: 15px; border: 4px solid #bdc3c7; background-color: #fff; box-shadow: 0 5px 15px rgba(0,0,0,0.1); overflow: hidden; }
    .slide-item img { width: 100%; height: 100%; object-fit: contain; }

    @keyframes divineReveal {
        0% { 
            opacity: 0; 
            transform: translateY(20px) scale(0.8); 
            filter: brightness(5) drop-shadow(0 0 50px #fff);
        }
        40% {
            opacity: 1;
            transform: translateY(-2px) scale(1.05);
            filter: brightness(2.5) drop-shadow(0 0 30px #f1c40f);
        }
        100% { 
            opacity: 1; 
            transform: translateY(0) scale(1); 
            filter: brightness(1) drop-shadow(0 0 15px #f39c12);
        }
    }

    @keyframes lilyGlow {
        0% { box-shadow: 0 0 15px rgba(241, 196, 15, 0.6), 0 0 30px rgba(241, 196, 15, 0.4); }
        50% { box-shadow: 0 0 30px rgba(241, 196, 15, 1), 0 0 50px rgba(241, 196, 15, 0.8); }
        100% { box-shadow: 0 0 15px rgba(241, 196, 15, 0.6), 0 0 30px rgba(241, 196, 15, 0.4); }
    }

    @keyframes auraExpand {
        0% { transform: translate(-50%, -50%) scale(0.5); opacity: 1; }
        100% { transform: translate(-50%, -50%) scale(2.5); opacity: 0; }
    }

    @keyframes shineSweep {
        0% { left: -100%; }
        20% { left: 200%; }
        100% { left: 200%; }
    }

    .btn-lily-special {
        background-color: #f1c40f; 
        border-bottom: 4px solid #f39c12;
        color: #2c3e50; 
        position: relative;
        overflow: hidden;
        margin: 0 10px;
        animation: divineReveal 2s cubic-bezier(0.25, 0.8, 0.25, 1) forwards, 
                   lilyGlow 2s 2s infinite alternate;
    }

    .btn-lily-special::before {
        content: '';
        position: absolute;
        top: 50%; left: 50%;
        width: 150%; height: 300%;
        background: radial-gradient(circle, rgba(255,255,255,0.8) 0%, rgba(255,255,255,0) 70%);
        pointer-events: none;
        animation: auraExpand 2s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
    }

    .btn-lily-special::after {
        content: '';
        position: absolute;
        top: -50%;
        left: -100%;
        width: 30%;
        height: 200%;
        background: rgba(255, 255, 255, 0.6);
        transform: rotate(30deg);
        animation: shineSweep 3s 2s infinite ease-in-out; 
        pointer-events: none;
    }

    #gallery-modal {
        display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(44, 62, 80, 0.9); z-index: 1000; flex-direction: column; 
        justify-content: center; align-items: center; animation: fadeIn 0.3s;
    }
    .gallery-box {
        background: #fffdf7; border: 6px solid #f39c12; border-radius: 20px; 
        padding: 30px; width: 85%; max-width: 400px; text-align: center; color: #2c3e50;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    .gallery-btn-main {
        background: #3498db; color: #fff; border: none; border-bottom: 4px solid #2980b9;
        padding: 15px 20px; border-radius: 12px; margin: 10px 0; font-family: inherit; 
        font-size: 20px; cursor: pointer; display: block; width: 100%; transition: 0.2s;
    }
    .gallery-btn-main:hover { background: #2980b9; transform: translateY(-2px); }
    
    .gallery-options { display: none; margin-bottom: 15px; background: #ecf0f1; padding: 15px; border-radius: 12px; }
    .gallery-sub-btn {
        display: inline-block; width: 45%; margin: 5px 2%; padding: 10px 0; font-size: 16px;
        background: #9b59b6; border-bottom: 4px solid #8e44ad; color: white; border-radius: 10px; cursor: pointer;
    }
    .gallery-sub-btn:hover { background: #8e44ad; }
    #waiting-top-right-controls {
        position: absolute; top: 20px; right: 20px;
        display: flex; gap: 10px; z-index: 20;
    }
    
    .top-action-btn {
        padding: 12px 20px; font-size: 20px; font-family: 'ONE-Mobile-POP', sans-serif;
        border-radius: 25px; border: none; cursor: pointer;
        transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .top-action-btn:hover { transform: translateY(-3px); }
    .top-action-btn:active { transform: translateY(2px); }
    
    .btn-intro-style { background-color: #7f8c8d; border-bottom: 5px solid #636e72; color: white; }
    .btn-intro-style:hover { background-color: #95a5a6; }
    
    .btn-gallery-style { background-color: #f1c40f; border-bottom: 5px solid #f39c12; color: #2c3e50; }
    .btn-gallery-style:hover { background-color: #f39c12; }

    @media (max-width: 600px) {
        #btn-open-gallery { 
            top: 45px !important; right: 10px !important; 
            font-size: 12px !important; padding: 6px 12px !important; 
        }
    }
@media (max-width: 600px) {
        .text-pc { display: none !important; }
        .text-mobile { display: inline !important; }

        #waiting-footer { 
            flex-direction: row !important; 
            justify-content: center;
            gap: 12px; 
            padding-bottom: 15px !important; 
        }

        #waiting-footer .btn-move {
            padding: 10px 20px !important;
            font-size: 15px !important;
        }

        #btn-review { 
            position: absolute !important; 
            right: 15px !important; 
            bottom: 15px !important; 
            margin-top: 0; 
            width: auto; 
            padding: 8px 12px !important; 
            font-size: 13px !important; 
        }

        .btn-skip {
            top: 10px !important; 
            right: 10px !important; 
            font-size: 12px !important; 
            padding: 6px 12px !important;
        }

        #waiting-top-right-controls {
            top: 10px !important;
            right: 10px !important;
            gap: 5px !important;
        }
        
        .top-action-btn {
            font-size: 12px !important; 
            padding: 6px 12px !important;
        }

        .score-board { top: 10px; left: 10px; font-size: 14px; padding: 5px 12px; border-width: 2px; }
        #waiting-header { padding-top: 55px !important; }
        #waiting-header h2 { font-size: 24px !important; margin-bottom: 5px; }
        #waiting-list-panel.detail-view { display: none; }
        .detail-layout { flex-direction: column; align-items: center; width: 100%; max-width: 100%; }
        .vertical-nav { flex-direction: row; padding-right: 0; padding-bottom: 15px; }
        .nav-btn { padding: 8px 15px; font-size: 16px; }
        
        #volume-sprite-container { 
            bottom: 5px !important;  
            left: 15px !important;   
            transform: scale(0.75) !important; 
            transform-origin: bottom left !important; 
            z-index: 100 !important;
        }
    }
</style>
</head>
<body>

<div id="game-container">
    <div class="score-board">현재 차원: <span id="score">0</span> / 8</div>
    <div id="toast-notification"></div>
    <div id="volume-sprite-container">
        <div id="volume-text">70%</div>
        <div id="volume-sprite"></div>
        <div id="volume-label">음량 조절</div>
    </div>

    <div id="screen-loading" class="screen active">
        <div id="loading-ui">
            <h2 id="loading-text" style="color: #34495e; font-size: 28px;">볼따구 전수 조사 중... (0%)</h2>
            <div id="loading-container"><div id="loading-bar"></div></div>
        </div>

        <div id="title-ui" style="display: none; flex-direction: column; align-items: center;">
            <div id="start-btn-container" style="transform: translateY(150px);">
                <button class="btn-move" style="font-size: 32px; padding: 25px 80px;" onclick="startGame()">게임 시작!</button>
            </div>
        </div>

        <div id="title-info" style="display: none;">
            <div class="copyright-notice" style="left: auto; right: 20px; bottom: 50px; text-align: right;">
                본 게임은 [에피드게임즈]의 '트릭컬 리바이브' IP를 활용한 비영리 목적의 팬 메이드 2차 창작물입니다.<br>
                게임 내 사용된 모든 이미지, 사운드 및 캐릭터 소스의 권리는 원저작권자인 [에피드게임즈]에 있습니다.<br>
                본 게임은 수익을 창출하지 않으며, 권리자의 요청이 있을 경우 예고 없이 중단될 수 있습니다.
            </div>
            <div class="release-date" style="bottom: 20px; right: 20px;">릴리즈 : 2026.03.03 (v1.2.1)</div>
        </div>
    </div>

    <div id="screen-intro" class="screen">
        <button class="btn-skip" onclick="skipIntro()">스킵 ⏭</button>
        <div class="char-image-container" style="margin-top: 30px;">
            <img id="intro-image" src="">
            <div id="intro-name-overlay" class="name-overlay"></div>
        </div>
        <div class="speech-box"><p id="intro-dialogue-text"></p></div>
        <div class="btn-group">
            <button class="btn-move" onclick="nextIntro()">다음 ▶</button>
        </div>
    </div>

    <div id="screen-waiting" class="screen" style="padding: 0;">
<div id="waiting-top-right-controls">
            <button id="btn-replay-intro" class="top-action-btn btn-intro-style" onclick="replayIntro()">오프닝 보기 🎬</button>
            <button id="btn-open-gallery" class="top-action-btn btn-gallery-style" onclick="openGallery()">엔딩 도감 📖</button>
        </div>

    async function loadVolumeSpriteXML() {
        try {
            const res = await fetch('./images/volume_sprite.xml'); 
            if (!res.ok) throw new Error("XML 파일을 찾을 수 없습니다.");

            const buffer = await res.arrayBuffer();
            const decoder = new TextDecoder('utf-8');
            let xmlText = decoder.decode(buffer);
            xmlText = xmlText.replace(/^[^<]+/, ""); 
            
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(xmlText, "text/xml");
            
            if (xmlDoc.getElementsByTagName("parsererror").length > 0) {
                throw new Error("XML 파싱 에러");
            }

            const textures = Array.from(xmlDoc.getElementsByTagName("SubTexture"));
            if (textures.length === 0) throw new Error("XML 프레임 정보 찾지 못함");

            textures.sort((a, b) => a.getAttribute("name").localeCompare(b.getAttribute("name")));

            spriteFramesData = textures.map(node => ({
                x: parseInt(node.getAttribute("x")),
                y: parseInt(node.getAttribute("y")),
                w: parseInt(node.getAttribute("width")),
                h: parseInt(node.getAttribute("height"))
            }));

            updateVolumeAndSprite(true);

        } catch (e) {
            console.error(e);
            alert("볼륨 스프라이트 에러: " + e.message);
        }
    }

    function updateVolumeAndSprite(isInitialLoad = false) {
        if (spriteFramesData.length === 0) return;

        const displayPercent = Math.round(currentGlobalVolume * 100);
        volumeText.innerText = `${displayPercent}%`;

        if (isInitialLoad) {
            volumeText.classList.remove('show');
        }

        Object.values(audioBGM).forEach(a => a.volume = currentGlobalVolume);
        Object.values(audioSFX).forEach(a => a.volume = currentGlobalVolume);

        let frameIndex = Math.round(currentGlobalVolume * (spriteFramesData.length - 1));
        if (frameIndex >= spriteFramesData.length) frameIndex = spriteFramesData.length - 1;
        if (frameIndex < 0) frameIndex = 0;

        const frame = spriteFramesData[frameIndex];
        
        volumeSprite.style.width = `${frame.w}px`;
        volumeSprite.style.height = `${frame.h}px`;
        volumeSprite.style.backgroundPosition = `-${frame.x}px -${frame.y}px`;
    }

    function handleVolumeDragMove(clientY) {
        if (!isDraggingVolume) return;
        let deltaY = clientY - dragStartY;
        let newVolume = dragStartVolume - (deltaY / 100); 
        
        if (newVolume < 0) newVolume = 0;
        if (newVolume > 1) newVolume = 1;
        
        currentGlobalVolume = newVolume;
        updateVolumeAndSprite();
    }

    let volumeTextTimeout;

    function showVolumeText() {
        volumeText.classList.add('show');
        if (volumeTextTimeout) clearTimeout(volumeTextTimeout);
    }

    function hideVolumeText() {
        if (volumeTextTimeout) clearTimeout(volumeTextTimeout);
        volumeTextTimeout = setTimeout(() => {
            volumeText.classList.remove('show');
        }, 1000); 
    }

    volumeContainer.addEventListener('mousedown', (e) => {
        isDraggingVolume = true;
        dragStartY = e.clientY;
        dragStartVolume = currentGlobalVolume;
        e.preventDefault(); 
        showVolumeText();
    });
    window.addEventListener('mousemove', (e) => {
        if (isDraggingVolume) {
            handleVolumeDragMove(e.clientY);
            showVolumeText();
        }
    });
    window.addEventListener('mouseup', () => { 
        if (isDraggingVolume) {
            isDraggingVolume = false; 
            hideVolumeText();
            playSFX('volumeTest'); 
        }
    });

    volumeContainer.addEventListener('touchstart', (e) => {

        dragStartY = e.touches[0].clientY;

    }, { passive: true });

        const currentScene = introStory[currentIntroIndex];
        const imgElement = document.getElementById('intro-image');
        imgElement.classList.remove('fade-in-effect');
        void imgElement.offsetWidth; 
        imgElement.src = currentScene.img;
        imgElement.classList.add('fade-in-effect');

        if (currentScene.name === "릴리") {
            const altImageSrc = "./images/lily_scream.webp"; 
            let timeoutId = null;
            imgElement.onclick = () => {
                imgElement.src = altImageSrc;
                if (timeoutId) clearTimeout(timeoutId);
                timeoutId = setTimeout(() => {
                    if (introStory[currentIntroIndex] === currentScene) {
                        imgElement.src = currentScene.img;
                    }
                }, 800); 
            };
        } else {
            imgElement.onclick = null;
        }
        
        document.getElementById('intro-name-overlay').innerText = currentScene.name;
        
        const textElement = document.getElementById('intro-dialogue-text');
        textElement.textContent = ""; 
        fullIntroText = currentScene.text;
        
        if (typeWriterInterval) clearInterval(typeWriterInterval);
        isTyping = true;
        
        let charIndex = 0;
        
        typeWriterInterval = setInterval(() => {
            if (charIndex < fullIntroText.length) {
                textElement.textContent = fullIntroText.substring(0, charIndex + 1);
                charIndex++;
            } else {
                clearInterval(typeWriterInterval);
                isTyping = false;
            }
        }, 40); 
    };

    window.nextIntro = () => {

    const getInitialConsonant = (str) => {
        const chosung = ["ㄱ", "ㄲ", "ㄴ", "ㄷ", "ㄸ", "ㄹ", "ㅁ", "ㅂ", "ㅃ", "ㅅ", "ㅆ", "ㅇ", "ㅈ", "ㅉ", "ㅊ", "ㅋ", "ㅌ", "ㅍ", "ㅎ"];
        const charCode = str.charCodeAt(0);
        if (charCode < 44032 || charCode > 55203) return str.charAt(0); 
        let initial = chosung[Math.floor((charCode - 44032) / 588)];
        const groupMap = { "ㄲ": "ㄱ", "ㄸ": "ㄷ", "ㅃ": "ㅂ", "ㅆ": "ㅅ", "ㅉ": "ㅈ" };
        return groupMap[initial] || initial;
    };

            btn.className = f === 'All' ? 'filter-btn all-btn' : 'filter-btn';
            if (f === 'All') btn.classList.add('active');
            btn.innerText = f === 'All' ? '전체' : f;

    function preloadImage(url) {
        return new Promise((resolve) => {
            if (!url || url.trim() === "") resolve(false);
            const img = new Image();
            img.src = url;
            img.onload = () => resolve(true);
            img.onerror = () => resolve(false);
        });
    }

async function loadDataAndStart() {
        try {
            const res = await fetch('./characters.csv');
            const csvText = await res.text();
            Papa.parse(csvText, {
                header: true,
                skipEmptyLines: true,
                complete: async function(results) {
                    const rawData = results.data;
                    let loadedCount = 0;
                    const tempChars = [];
                    for (let row of rawData) {
                        const charObj = {
                            id: row.id, name: row.name, nameq: row.nameq || row.name,
                            isOriginal: row.isOriginal.trim().toLowerCase() === 'true',
                            waitingImg: row.waitingImg, questionImg: row.questionImg,
                            correctImg: row.correctImg, wrongImg: row.wrongImg,
                            winMsg: row.winMsg, loseMsg: row.loseMsg,
                            questionText: row.questionText || "..."
                        };
                        const checks = await Promise.all([
                            preloadImage(charObj.waitingImg), preloadImage(charObj.questionImg),
                            preloadImage(charObj.correctImg), preloadImage(charObj.wrongImg)
                        ]);
                        if (checks.every(s => s)) tempChars.push(charObj);
                        loadedCount++;
                        const percent = Math.round((loadedCount / rawData.length) * 100);
                        document.getElementById('loading-text').innerText = `볼따구 모집 중... (${percent}%)`;
                        document.getElementById('loading-bar').style.width = `${percent}%`;
                    }
                    CHARACTERS = tempChars;
                    window.initFilters(); 
                    document.getElementById('screen-loading').classList.add('loaded');

                    document.getElementById('loading-ui').style.display = "none";
                    document.getElementById('title-ui').style.display = "flex";
                    document.getElementById('title-info').style.display = "block";
                    document.getElementById('volume-sprite-container').style.display = "flex";
                }
            });
        } catch (e) { document.getElementById('loading-text').innerText = "데이터 로딩 실패"; }
    }

    window.resetGame = () => {
        document.querySelector('.score-board').style.display = 'block';
        score = 0;
        currentRunHistory = [];
        remainingPool = [...CHARACTERS];
        window.enterWaitingRoom();
    };

        const state = playerProgress[char.id] || 'unattempted';
        const statsOverlay = document.getElementById('waiting-stats-overlay');
        statsOverlay.style.display = 'block';
        
        let truthHtml = char.isOriginal 
            ? '<div style="background:#2ecc71; border: 2px solid #27ae60; color:#fff; border-radius:8px; padding:3px; margin-bottom:5px; text-align:center; font-weight:bold; font-size:15px;">\uC9C4\uC9DC</div>' 
            : '<div style="background:#e74c3c; border: 2px solid #c0392b; color:#fff; border-radius:8px; padding:3px; margin-bottom:5px; text-align:center; font-weight:bold; font-size:15px;">\uAC00\uC9DC</div>';

        statsOverlay.innerHTML = truthHtml + '\uB85C\uB529\u0020\uC911\u002E\u002E\u002E'; 
        
        const snap = await getDoc(doc(db, "characters", char.id.toString()));
        if (snap.exists()) {
            const d = snap.data();
            const rate = Math.round((d.wrong / d.total) * 100) || 0;
            currentDetailChar.fetchedRate = rate;
            const colorStyle = rate >= 70 ? 'color: #ff7675;' : 'color: #f1c40f;';
            statsOverlay.innerHTML = truthHtml + '\uC624\uB2F5\uB960\u003A <strong style="' + colorStyle + ' font-size: 16px;">' + rate + '%</strong><br><span style="font-size: 12px; opacity: 0.8;">(총 '+d.total+'회 참여)</span>';
        } else {
            currentDetailChar.fetchedRate = 0;
            statsOverlay.innerHTML = truthHtml + 'No Data';
        }

        window.changeDetailView('question');
    };

    window.changeDetailView = (viewType) => {
        if (!currentDetailChar) return;
        
        document.getElementById('nav-btn-q').classList.remove('active');
        document.getElementById('nav-btn-o').classList.remove('active');
        document.getElementById('nav-btn-x').classList.remove('active');
        
        const header = document.getElementById('waiting-result-header');
        const img = document.getElementById('waiting-char-image');
        const text = document.getElementById('waiting-dialogue-text');
        const nameOverlay = document.getElementById('waiting-name-overlay');
        
        nameOverlay.style.display = 'block'; 

        if (viewType === 'question') {
            document.getElementById('nav-btn-q').classList.add('active');
            const state = playerProgress[currentDetailChar.id];
            if (state === 'correct') {
                header.innerText = "맞춘 문제에요"; 
                header.className = "result-title result-correct";
            } else {
                header.innerText = "틀린 문제에요";

            img.src = currentDetailChar.questionImg;

            img.src = currentDetailChar.correctImg;

function renderSlidingChars(chars) {
        const container = document.getElementById('ending-slide-container');
        const track = document.getElementById('ending-slide-track');
        track.innerHTML = '';
        
        if (chars.length === 0) {
            track.innerHTML = '<span style="color:#7f8c8d; font-size:24px; margin:auto;">(해당 기록 없음)</span>';
            track.style.animation = 'none';
            track.style.width = '100%';
            track.style.justifyContent = 'center';
            return;
        }

        track.style.justifyContent = 'flex-start';
        track.style.width = 'max-content';
        
        chars.forEach((char) => {
            const wrapper = document.createElement('div');
            wrapper.className = 'slide-item';
            
            const img = document.createElement('img');
            img.src = char.questionImg;
            
            const nameDiv = document.createElement('div');
            nameDiv.className = 'name-overlay';
            nameDiv.style.fontSize = '14px'; 
            nameDiv.style.padding = '4px 8px';
            nameDiv.style.top = '5px';
            nameDiv.style.left = '5px';
            nameDiv.innerText = char.name; 
            
            wrapper.appendChild(img);
            wrapper.appendChild(nameDiv);
            track.appendChild(wrapper);
        });

        const containerWidth = container.clientWidth || 900;
        
        setTimeout(() => {
            const trackWidth = track.scrollWidth;
            
            let styleEl = document.getElementById('dynamic-marquee-style');
            if (!styleEl) {
                styleEl = document.createElement('style');
                styleEl.id = 'dynamic-marquee-style';
                document.head.appendChild(styleEl);
            }
            
            const totalDistance = containerWidth + trackWidth;
            
            styleEl.innerHTML = `
                @keyframes dynamicSlideShow {
                    0% { transform: translateX(${containerWidth}px); }
                    100% { transform: translateX(-${trackWidth}px); }
                }
            `;

            const speedPerSecond = 150; 
            const duration = totalDistance / speedPerSecond; 
            
            track.style.animation = 'none';
            void track.offsetWidth;
            track.style.animation = `dynamicSlideShow ${duration}s linear infinite`;
        }, 50);
    }

            if (charIndex < text.length) {
                element.textContent = text.substring(0, charIndex + 1);
                charIndex++;
            } else {
                clearInterval(endingTypeWriterInterval);
                isEndingTyping = false;
            }
        }, 40);
    }

async function recordAndFetchEndingStats(choice, isHiddenClear) {
        const hasCleared = localStorage.getItem('trickcal_ending_cleared');
        const hasHCleared = localStorage.getItem('trickcal_h_ending_cleared');
        const statRef = doc(db, "system", "ending_stats");

        let hpercent = 100;
        let totalHCount = 0;

            if (choice !== 'lily' && !hasCleared) {
                try {
                    await updateDoc(statRef, {
                        [choice === 'real' ? 'real_count' : 'fake_count']: increment(1)
                    });
                } catch (e) {
                    await setDoc(statRef, {
                        real_count: choice === 'real' ? 1 : 0,
                        fake_count: choice === 'fake' ? 1 : 0
                    });
                }
                localStorage.setItem('trickcal_ending_cleared', 'true');
            }

            if (choice === 'lily' && !hasHCleared) {
                try {
                    await updateDoc(statHRef, {
                        ['h_count']: increment(1)
                    });
                } catch (e) {
                    await setDoc(statHRef, {
                        h_count : 1
                    });
                }
                localStorage.setItem('trickcal_h_ending_cleared', 'true');
            }

            const snap = await getDoc(statRef);
            if (snap.exists()) {
                const d = snap.data();
                totalCount = (d.real_count || 0) + (d.fake_count || 0); 
                if (totalCount > 0 && choice !== 'lily') {
                    const count = choice === 'real' ? (d.real_count || 0) : (d.fake_count || 0);
                    percent = Math.round((count / totalCount) * 100);
                }
            }
            
            const hsnap = await getDoc(statHRef);
            if (hsnap.exists()) {
                const d = snap.data();
                const hd = hsnap.data();
                totalCount = (d.real_count || 0) + (d.fake_count || 0); 
                totalHCount = (hd.h_count || 0); 
                if (totalCount > 0) {
                    hpercent = Math.round((totalHCount / totalCount) * 100);
                }
            }
        } catch(error) {
            console.error("Firebase error: ", error);
        }
        
        return { percent: percent, total: totalCount, hpercent: hpercent, htotal: totalHCount };
    }

    const scrollArea = document.getElementById('waiting-list-panel');
    let isDown = false;
    let startY;
    let scrollTop;

    scrollArea.addEventListener('mousedown', (e) => {
        if (scrollArea.className === 'full-view') return; 
        isDown = true;
        isDraggingList = false; 
        startY = e.pageY - scrollArea.offsetTop;
        scrollTop = scrollArea.scrollTop;
    });
    scrollArea.addEventListener('mouseleave', () => { isDown = false; });
    scrollArea.addEventListener('mouseup', () => {
        isDown = false;
        setTimeout(() => isDraggingList = false, 50); 
    });
    scrollArea.addEventListener('mousemove', (e) => {
        if (!isDown) return;
        e.preventDefault();
        const y = e.pageY - scrollArea.offsetTop;
        const walk = (y - startY) * 1.5; 
        
        if (Math.abs(walk) > 5) isDraggingList = true; 
        scrollArea.scrollTop = scrollTop - walk;
    });

    loadDataAndStart();
</script>
</body>
</html>
